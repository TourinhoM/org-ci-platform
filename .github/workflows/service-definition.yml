name: Service Definition

# Reusable separado de ci-pr/ci-push de propósito: o contrato platform.yaml é
# conceito do modelo de deploy da plataforma (gitops), não do produto genérico
# de CI — consumer sem gitops usa ci-* sem carregar esse acoplamento.
# O caller restringe o trigger por paths (só roda quando platform.yaml muda);
# a action ainda no-opa se o arquivo não existir (rollout não-quebra).
on:
  workflow_call:
    inputs:
      file:
        description: Caminho do platform definition no repo consumer
        required: false
        default: platform.yaml
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate contract
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: TourinhoM/org-ci-platform/.github/actions/service-definition-validate@main
        with:
          file: ${{ inputs.file }}

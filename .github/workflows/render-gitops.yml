name: Render GitOps

# Day-2 da plataforma: o dev edita o platform.yaml (SSOT na raiz do app repo),
# o push dispara este workflow, que materializa a intenção no gitops-<app>.
# Mesmos templates do scaffolder (skeleton do platform-templates) — anti-drift:
# day-1 (Backstage) e day-2 (este CI) rendem do mesmo lugar, nunca divergem.
#
# Job único com steps sequenciais — validação, render e push compartilham o
# mesmo workspace e skip de step não contamina o grafo.
#
# Escrita cross-repo via RELEASE_APP (GitHub App), mesmo mecanismo da promoção
# de tag no ci-tag: o dev não precisa de write no gitops repo (separation of
# duties — deploy state é output de CI). Push direto em main do gitops repo,
# sem PR: o repo é 100% escrito por máquina e o review humano já aconteceu no
# PR do platform.yaml no app repo.
on:
  workflow_call:
    inputs:
      file:
        description: Caminho do platform definition no repo consumer
        required: false
        default: platform.yaml
        type: string
      skeleton-ref:
        description: Ref do platform-templates de onde sai o skeleton (anti-drift c/ o scaffolder)
        required: false
        default: main
        type: string
    # Declarado explicitamente: secret não-declarado em workflow_call.secrets
    # chega VAZIO mesmo com inherit (mesma armadilha já corrigida no ci-tag).
    secrets:
      RELEASE_APP_PRIVATE_KEY:
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  render:
    name: Render platform.yaml → gitops
    runs-on: ubuntu-latest
    permissions:
      contents: read   # a escrita é no OUTRO repo, via token do App (não GITHUB_TOKEN)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Gate do contrato antes de qualquer escrita: intenção inválida não
      # chega nem perto do gitops repo.
      - uses: TourinhoM/org-ci-platform/.github/actions/service-definition-validate@main
        with:
          file: ${{ inputs.file }}

      - name: Gera app token (escopado ao gitops-<app>)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: gitops-${{ github.event.repository.name }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ github.repository_owner }}/gitops-${{ github.event.repository.name }}
          token: ${{ steps.app-token.outputs.token }}
          ref: main
          path: gitops
          persist-credentials: true
          fetch-depth: 1

      # Skeleton vem do platform-templates (TourinhoM, hardcoded como os refs de
      # component do app-base no próprio skeleton) — fonte ÚNICA da forma, a mesma
      # que o Backstage usa no day-1. Público: sem token.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: TourinhoM/platform-templates
          ref: ${{ inputs.skeleton-ref }}
          path: skeleton-src
          fetch-depth: 1

      # Materializa a intenção com os MESMOS templates do scaffolder (nunjucks).
      # Rende base/ + overlays/dev (ativo) + stages/{hml,prod} (inertes, p/ o Kargo
      # promover via copy) — o env está baked no skeleton.
      - uses: TourinhoM/org-ci-platform/.github/actions/platform-render@main
        with:
          platform-file: ${{ inputs.file }}
          skeleton-dir: skeleton-src/templates/_skeletons
          gitops-dir: gitops

      - name: Commit and push
        shell: bash
        working-directory: gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Render idêntico ao estado atual — nada a commitar."
            exit 0
          fi
          git commit -m "chore(render): materializa platform.yaml de ${{ github.repository }}@${GITHUB_SHA:0:7} [skip ci]"
          git push origin main

# Orchestrator: Pull Request pipeline (Sonar → Semantic commit check)
name: CI Pull Request

on:
  workflow_call:
    inputs:
      main-branch:
        required: false
        default: 'main'
        type: string
      ci-platform-repo:
        required: false
        default: 'YOUR_ORG/org-ci-platform'
        type: string
    secrets:
      SONAR_TOKEN:
        required: true

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: ${{ inputs.ci-platform-repo }}/.github/actions/sonarqube@main
        with:
          sonar-args: >
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
            -Dsonar.pullrequest.branch=${{ github.head_ref }}
            -Dsonar.pullrequest.base=${{ inputs.main-branch }}

  semantic-commit-check:
    name: Semantic commit check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ${{ inputs.ci-platform-repo }}/.github/actions/semantic-commit-check@main

name: CI - Pull Request

on:
  workflow_call:
    inputs:
      coverage-exclusions:
        required: false
        type: string
    secrets:
      SONAR_TOKEN:
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:

  # -----------------------------
  # 1️⃣ Trivy FS
  # -----------------------------
  trivy-fs:
    name: Trivy FS Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: TourinhoM/org-ci-platform/.github/actions/trivy-fs@main

  # -----------------------------
  # 2️⃣ Secret Scan (gitleaks)
  # -----------------------------
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: TourinhoM/org-ci-platform/.github/actions/secret-scan@main

  # -----------------------------
  # 3️⃣ SAST (SonarQube quando SONAR_ORG está configurado; senão Semgrep)
  # -----------------------------
  # Job único com steps condicionais em vez de dois jobs mutuamente
  # exclusivos: skip de JOB contamina a cadeia transitiva de needs e
  # pula os jobs downstream. Skip de STEP não contamina nada.
  sast:
    name: SAST
    runs-on: ubuntu-latest
    needs: trivy-fs
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: TourinhoM/org-ci-platform/.github/actions/unit-test@main
      - name: SonarQube
        if: vars.SONAR_ORG != ''
        uses: TourinhoM/org-ci-platform/.github/actions/sonarqube@main
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          sonar-organization: ${{ vars.SONAR_ORG }}
          coverage-exclusions: ${{ inputs.coverage-exclusions }}
          sonar-args: ""
      - name: Semgrep
        if: vars.SONAR_ORG == ''
        uses: TourinhoM/org-ci-platform/.github/actions/semgrep@main

  # -----------------------------
  # 4️⃣ Semantic Commit Check
  # -----------------------------
  semantic-commit-check:
    name: Semantic Commit Check
    runs-on: ubuntu-latest
    needs: sast
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: TourinhoM/org-ci-platform/.github/actions/semantic-commit-check@main

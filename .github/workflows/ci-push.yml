# Orchestrator: Push pipeline (Trivy FS → Sonar → Docker build → Trivy scan → Docker push)
name: CI Push

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Docker image name (e.g. myorg/myapp)'
        required: true
        type: string
      dockerfile-path:
        required: false
        default: './Dockerfile'
        type: string
      coverage-path:
        required: false
        default: 'coverage.xml'
        type: string
      ci-platform-repo:
        required: false
        default: 'YOUR_ORG/org-ci-platform'
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      SONAR_TOKEN:
        required: true

jobs:
  trivy-fs:
    name: Trivy FS Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ${{ inputs.ci-platform-repo }}/.github/actions/trivy-fs@main

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: ${{ inputs.ci-platform-repo }}/.github/actions/sonarqube@main
        with:
          coverage-path: ${{ inputs.coverage-path }}

  docker-build:
    name: Docker build (artefato)
    needs: [trivy-fs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ${{ inputs.ci-platform-repo }}/.github/actions/docker-build-artifact@main
        with:
          image-ref: ${{ inputs.image-name }}:${{ github.sha }}
          dockerfile-path: ${{ inputs.dockerfile-path }}

  trivy-image:
    name: Trivy container scan
    needs: [docker-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
      - run: docker load -i image.tar
      - uses: ${{ inputs.ci-platform-repo }}/.github/actions/trivy-image@main
        with:
          image-ref: ${{ inputs.image-name }}:${{ github.sha }}

  docker-push:
    name: Docker push
    needs: [trivy-image]
    runs-on: ubuntu-latest
    env:
      LOGIN_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      LOGIN_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    steps:
      - uses: ${{ inputs.ci-platform-repo }}/.github/actions/docker-push-artifact@main
        with:
          image-ref: ${{ inputs.image-name }}:${{ github.sha }}
          push-tags: |
            ${{ inputs.image-name }}:${{ github.sha }}
            ${{ inputs.image-name }}:latest

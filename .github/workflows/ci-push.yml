name: CI - Push

on:
  workflow_call:
    inputs:
      dockerfile-path:
        required: false
        default: './Dockerfile'
        type: string
      coverage-exclusions:
        required: false
        type: string
    secrets:
      SONAR_TOKEN:
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # -----------------------------
  # 1️⃣ Trivy FS
  # -----------------------------
  trivy-fs:
    name: Trivy FS Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: TourinhoM/org-ci-platform/.github/actions/trivy-fs@main

  # -----------------------------
  # 2️⃣ Secret Scan (gitleaks)
  # -----------------------------
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: TourinhoM/org-ci-platform/.github/actions/secret-scan@main

  # -----------------------------
  # 3️⃣ Trivy Config (Dockerfile lint)
  # -----------------------------
  trivy-config:
    name: Trivy Config Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: TourinhoM/org-ci-platform/.github/actions/trivy-config@main
        with:
          config-path: ${{ inputs.dockerfile-path }}

  # -----------------------------
  # 4️⃣ SAST (SonarQube quando SONAR_ORG está configurado; senão Semgrep)
  # -----------------------------
  # Job único com steps condicionais em vez de dois jobs mutuamente
  # exclusivos: skip de JOB contamina a cadeia transitiva de needs e pula
  # docker-build/trivy-image/docker-push mesmo com prepare-image verde.
  # Skip de STEP não contamina nada — o grafo fica 100% incondicional.
  sast:
    name: SAST
    runs-on: ubuntu-latest
    needs: [trivy-fs, secret-scan, trivy-config]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: TourinhoM/org-ci-platform/.github/actions/unit-test@main
        if: "!startsWith(github.ref, 'refs/tags/')"
      - name: SonarQube
        if: vars.SONAR_ORG != '' && !startsWith(github.ref, 'refs/tags/')
        uses: TourinhoM/org-ci-platform/.github/actions/sonarqube@main
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          sonar-organization: ${{ vars.SONAR_ORG }}
          coverage-exclusions: ${{ inputs.coverage-exclusions }}
          sonar-args: ""
      - name: Semgrep
        if: vars.SONAR_ORG == '' && !startsWith(github.ref, 'refs/tags/')
        uses: TourinhoM/org-ci-platform/.github/actions/semgrep@main

  # -----------------------------
  # 5️⃣ Prepare Image
  # -----------------------------
  prepare-image:
    name: Prepare image
    runs-on: ubuntu-latest
    needs: sast
    outputs:
      image_repo: ${{ steps.prepare.outputs.repo }}
      image_tag: ${{ steps.prepare.outputs.tag }}
      push_tags: ${{ steps.prepare.outputs.push_tags }}
    steps:
      - id: prepare
        uses: TourinhoM/org-ci-platform/.github/actions/prepare-image-tag@main

  # -----------------------------
  # 6️⃣ Docker Build
  # -----------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: prepare-image
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: TourinhoM/org-ci-platform/.github/actions/docker-build-artifact@main
        with:
          image-ref: ghcr.io/${{ needs.prepare-image.outputs.image_repo }}:${{ needs.prepare-image.outputs.image_tag }}
          dockerfile-path: ./Dockerfile

  # -----------------------------
  # 7️⃣ Trivy Image
  # -----------------------------
  trivy-image:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: [docker-build, prepare-image]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docker-image
      - run: docker load -i image.tar
      - uses: TourinhoM/org-ci-platform/.github/actions/trivy-image@main
        with:
          image-ref: ghcr.io/${{ needs.prepare-image.outputs.image_repo }}:${{ needs.prepare-image.outputs.image_tag }}

  # -----------------------------
  # 8️⃣ Docker Push
  # -----------------------------
  docker-push:
    name: Docker Push
    runs-on: ubuntu-latest
    needs: [trivy-image, prepare-image]
    permissions:
      contents: read
      packages: write
    env:
      LOGIN_USERNAME: ${{ github.actor }}
      LOGIN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: TourinhoM/org-ci-platform/.github/actions/docker-push-artifact@main
        with:
          image-ref: ghcr.io/${{ needs.prepare-image.outputs.image_repo }}:${{ needs.prepare-image.outputs.image_tag }}
          push-tags: ${{ needs.prepare-image.outputs.push_tags }}
          registry: ghcr.io

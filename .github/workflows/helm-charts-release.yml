name: Helm Charts - Release (OCI)

# Publica no GHCR OCI as versões NOVAS dos charts (idempotente por nome+versão).
# Auth via GHCR_TOKEN (PAT/App com write:packages) — o GITHUB_TOKEN NÃO serve:
# dá 403 "installation does not exist" ao criar package org cujo nome não casa
# com o repo. cancel-in-progress false: release produz artefato versionado.
on:
  workflow_call:
    inputs:
      registry:
        required: false
        default: oci://ghcr.io/tourinho-labs/charts
        type: string
      charts-dir:
        required: false
        default: charts
        type: string
    secrets:
      GHCR_TOKEN:
        description: PAT/App token com write:packages na org do registry. Declarado aqui pois cross-org não herda por inherit.
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - name: Login GHCR (OCI)
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          if [ -z "${GHCR_TOKEN:-}" ]; then
            echo "::error::secret GHCR_TOKEN vazio — crie um PAT/App com write:packages e registre o secret GHCR_TOKEN no repo (ou na org com acesso ao repo)."
            exit 1
          fi
          echo "$GHCR_TOKEN" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
      - uses: TourinhoM/org-ci-platform/.github/actions/helm-publish-oci@main
        with:
          registry: ${{ inputs.registry }}
          charts-dir: ${{ inputs.charts-dir }}

name: Helm Charts - Release (OCI)

# Publica no GHCR OCI as versões NOVAS dos charts (idempotente por nome+versão).
# Auth = GITHUB_TOKEN (permissions.packages:write), mesmo caminho da imagem de
# container: o token é escopado ao owner do repo e cria o package embaixo dele,
# sem cair no check de "organization package" que barra token de GitHub App.
# O registry é DERIVADO do owner do repo (ghcr.io/<owner-minúsculo>/charts) —
# publicar em owner diferente do token/repo dá 403. cancel false: release.
on:
  workflow_call:
    inputs:
      registry:
        description: Base OCI. Vazio = ghcr.io/<owner-do-repo em minúsculo>/charts.
        required: false
        default: ''
        type: string
      charts-dir:
        required: false
        default: charts
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - name: Resolve registry + login GHCR
        shell: bash
        run: |
          set -euo pipefail
          REG='${{ inputs.registry }}'
          if [ -z "$REG" ]; then
            owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            REG="oci://ghcr.io/${owner}/charts"
          fi
          echo "REGISTRY=$REG" >> "$GITHUB_ENV"
          echo "registry resolvido: $REG"
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
      - uses: TourinhoM/org-ci-platform/.github/actions/helm-publish-oci@main
        with:
          registry: ${{ env.REGISTRY }}
          charts-dir: ${{ inputs.charts-dir }}

# Pipeline único – toda a lógica fica aqui (como o include do GitLab).
# O projeto só chama este workflow; quem decide o que rodar é o evento (push/PR/tag).
name: CI

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        default: '3.11'
        type: string
      image-name:
        description: 'Docker image name (e.g. myorg/myapp)'
        required: true
        type: string
      dockerfile-path:
        required: false
        default: './Dockerfile'
        type: string
      coverage-path:
        required: false
        default: 'coverage.xml'
        type: string
      main-branch:
        required: false
        default: 'main'
        type: string
      ci-platform-repo:
        required: false
        default: 'YOUR_ORG/org-ci-platform'
        type: string
    secrets:
      DOCKER_USERNAME:
        required: false
      DOCKER_PASSWORD:
        required: false
      SONAR_TOKEN:
        required: false
      GITHUB_TOKEN:
        required: false

jobs:
  # ---- Push (main): segurança + testes + qualidade + build + scan imagem ----
  trivy-fs:
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'push'
    name: Trivy FS Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ${{ inputs.ci-platform-repo }}/.github/actions/trivy-fs@main

  unit-test:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' &&
      !startsWith(github.ref, 'refs/tags/') &&
      github.ref != format('refs/heads/{0}', inputs.main-branch))
    name: Unit tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 1 }}
      - uses: ${{ inputs.ci-platform-repo }}/.github/actions/unit-test-python@main
        with:
          python-version: ${{ inputs.python-version }}
          coverage-path: ${{ inputs.coverage-path }}

  sonarqube:
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', inputs.main-branch) || github.event_name == 'pull_request'
    needs: [unit-test]
    name: SonarQube
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: ${{ inputs.ci-platform-repo }}/.github/actions/sonarqube@main
        with:
          coverage-path: ${{ inputs.coverage-path }}
          sonar-args: >-
            ${{ github.event_name == 'pull_request' && format('-Dsonar.pullrequest.key={0} -Dsonar.pullrequest.branch={1} -Dsonar.pullrequest.base={2}', github.event.pull_request.number, github.head_ref, inputs.main-branch) || '' }}
  # ---- Tag: build + push imagem + scan ----
  docker-build-branch:
    if: |
      github.event_name == 'push' &&
      !startsWith(github.ref, 'refs/tags/') &&
      github.ref != format('refs/heads/{0}', inputs.main-branch)
    needs: [trivy-fs, unit-test]

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: ${{ inputs.ci-platform-repo }}/.github/actions/docker-build-push@main
        with:
          dockerfile-path: ${{ inputs.dockerfile-path }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  docker-build-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    name: Docker build (release)
    needs: [unit-test]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: ${{ inputs.ci-platform-repo }}/.github/actions/docker-build-push@main
        with:
          dockerfile-path: ${{ inputs.dockerfile-path }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

  trivy-image-branch:
    if: |
      github.event_name == 'push' &&
      !startsWith(github.ref, 'refs/tags/') &&
      github.ref != format('refs/heads/{0}', inputs.main-branch)
    needs: [docker-build-branch]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - uses: ${{ inputs.ci-platform-repo }}/.github/actions/trivy-image@main
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ github.sha }}

  trivy-image-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: [docker-build-release]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - uses: ${{ inputs.ci-platform-repo }}/.github/actions/trivy-image@main
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ github.ref_name }}


  # ---- PR: semantic commit check ----
  semantic-commit-check:
    if: github.event_name == 'pull_request'
    name: Semantic commit check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ${{ inputs.ci-platform-repo }}/.github/actions/semantic-commit-check@main

  # ---- Push main: semantic release (tag + release no GitHub) ----
  semantic-release:
    if: github.event_name == 'push' &&
        github.ref == format('refs/heads/{0}', inputs.main-branch)
    name: Semantic Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
          branch: ${{ inputs.main-branch }}

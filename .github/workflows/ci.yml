# Pipeline único – toda a lógica fica aqui (como o include do GitLab).
# O projeto só chama este workflow; quem decide o que rodar é o evento (push/PR/tag).
name: CI

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Docker image name (e.g. myorg/myapp)'
        required: true
        type: string
      dockerfile-path:
        required: false
        default: './Dockerfile'
        type: string
      coverage-path:
        required: false
        default: 'coverage.xml'
        type: string
      main-branch:
        required: false
        default: 'main'
        type: string
      ci-platform-repo:   # 👈 ISSO PRECISA EXISTIR
        required: false
        default: 'TourinhoM/org-ci-platform'
        type: string
      caller-event:
        required: true
        type: string
      caller-ref:
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: false
      DOCKER_PASSWORD:
        required: false
      SONAR_TOKEN:
        required: false
        
permissions:
  contents: read
  security-events: write
  actions: read
  packages: write

jobs:
  # ---- Push / PR: Trivy FS Scan ----
  trivy-fs:
    name: Trivy FS Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: TourinhoM/org-ci-platform/.github/actions/trivy-fs@main

  # ---- SonarQube ----
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    if: >
      !startsWith(inputs.caller-ref, 'refs/tags/') &&
      inputs.caller-ref != format('refs/heads/{0}', inputs.main-branch)
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: TourinhoM/org-ci-platform/.github/actions/sonarqube@main
        with:
          coverage-path: ${{ inputs.coverage-path }}
          sonar-args: ""
  prepare-image:
    name: Prepare image name
    runs-on: ubuntu-latest
    needs: [sonarqube]
    outputs:
      image_repo: ${{ steps.normalize.outputs.repo }}
    steps:
      - name: Normalize image name
        id: normalize
        run: |
          echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
  # ---- Docker build branch ----
  docker-build-branch:
    name: Docker build (branch - SHA)
    runs-on: ubuntu-latest
    needs: [prepare-image]
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') && github.ref != format('refs/heads/{0}', inputs.main-branch)
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: TourinhoM/org-ci-platform/.github/actions/docker-build-push@main
        with:
          dockerfile-path: ${{ inputs.dockerfile-path }}
          tags: |
            ghcr.io/${{ needs.prepare-image.outputs.image_repo }}:${{ github.sha }}

  # ---- Docker build release ----
  docker-build-release:
    name: Docker build (release)
    runs-on: ubuntu-latest
    needs: [prepare-image]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: TourinhoM/org-ci-platform/.github/actions/docker-build-push@main
        with:
          dockerfile-path: ${{ inputs.dockerfile-path }}
          tags: |
            ghcr.io/${{ needs.prepare-image.outputs.image_repo }}:${{ github.ref_name }}
            ghcr.io/${{ needs.prepare-image.outputs.image_repo }}:latest

  # ---- Trivy scan branch image ----
  trivy-image-branch:
    name: Trivy scan (branch image)
    runs-on: ubuntu-latest
    needs: [docker-build-branch, prepare-image]
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') && github.ref != format('refs/heads/{0}', inputs.main-branch)
    permissions:
      contents: read
      packages: read
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: TourinhoM/org-ci-platform/.github/actions/trivy-image@main
        with:
          image-ref: ghcr.io/${{ needs.prepare-image.outputs.image_repo }}:${{ github.sha }}

  # ---- Trivy scan release image ----
  trivy-image-release:
    name: Trivy scan (release image)
    runs-on: ubuntu-latest
    needs: [docker-build-release, prepare-image]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: read
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: TourinhoM/org-ci-platform/.github/actions/trivy-image@main
        with:
          image-ref: ghcr.io/${{ needs.prepare-image.outputs.image_repo }}:${{ github.ref_name }}

  # ---- Semantic commit check ----
  semantic-commit-check:
    name: Semantic commit check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: TourinhoM/org-ci-platform/.github/actions/semantic-commit-check@main

  # ---- Semantic release ----
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: [sonarqube]
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', inputs.main-branch)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
          branch: ${{ inputs.main-branch }}
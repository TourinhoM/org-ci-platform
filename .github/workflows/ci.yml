# Pipeline único – toda a lógica fica aqui (como o include do GitLab).
# O projeto só chama este workflow; quem decide o que rodar é o evento (push/PR/tag).
name: CI

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        default: '3.11'
        type: string
      image-name:
        description: 'Docker image name (e.g. myorg/myapp)'
        required: true
        type: string
      dockerfile-path:
        required: false
        default: './Dockerfile'
        type: string
      coverage-path:
        required: false
        default: 'coverage.xml'
        type: string
      main-branch:
        required: false
        default: 'main'
        type: string
      ci-platform-repo:
        required: false
        default: 'YOUR_ORG/org-ci-platform'
        type: string
    secrets:
      DOCKER_USERNAME:
        required: false
      DOCKER_PASSWORD:
        required: false
      SONAR_TOKEN:
        required: false
      GITHUB_TOKEN:
        required: false

jobs:
  # ---- Push / PR: Trivy FS Scan ----
  trivy-fs:
    name: Trivy FS Scan
    runs-on: ubuntu-latest
    env:
      CI_PLATFORM_REPO: ${{ inputs.ci-platform-repo }}
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: ${{ env.CI_PLATFORM_REPO }}/.github/actions/trivy-fs@main

  # ---- Unit Test ----
  unit-test:
    name: Unit tests (Python)
    runs-on: ubuntu-latest
    env:
      MAIN_BRANCH: ${{ inputs.main-branch }}
      PYTHON_VERSION: ${{ inputs.python-version }}
      COVERAGE_PATH: ${{ inputs.coverage-path }}
      CI_PLATFORM_REPO: ${{ inputs.ci-platform-repo }}
    if: github.event_name == 'pull_request' || 
        (github.event_name == 'push' && 
         !startsWith(github.ref, 'refs/tags/') && 
         github.ref != format('refs/heads/{0}', env.MAIN_BRANCH))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 1 }}
      - uses: ${{ env.CI_PLATFORM_REPO }}/.github/actions/unit-test-python@main
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          coverage-path: ${{ env.COVERAGE_PATH }}

  # ---- SonarQube ----
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: [unit-test]
    env:
      MAIN_BRANCH: ${{ inputs.main-branch }}
      COVERAGE_PATH: ${{ inputs.coverage-path }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      CI_PLATFORM_REPO: ${{ inputs.ci-platform-repo }}
    if: github.event_name == 'pull_request' || 
        (github.event_name == 'push' && github.ref == format('refs/heads/{0}', env.MAIN_BRANCH))
    steps:
      - uses: actions/checkout@v4
      - uses: ${{ env.CI_PLATFORM_REPO }}/.github/actions/sonarqube@main
        with:
          coverage-path: ${{ env.COVERAGE_PATH }}
          sonar-args: >-
            ${{ github.event_name == 'pull_request' && format('-Dsonar.pullrequest.key={0} -Dsonar.pullrequest.branch={1} -Dsonar.pullrequest.base={2}', github.event.pull_request.number, github.head_ref, env.MAIN_BRANCH) || '' }}

  # ---- Docker build branch ----
  docker-build-branch:
    name: Docker build (branch - SHA)
    runs-on: ubuntu-latest
    needs: [trivy-fs, unit-test]
    env:
      DOCKERFILE_PATH: ${{ inputs.dockerfile-path }}
      IMAGE_NAME: ${{ inputs.image-name }}
      CI_PLATFORM_REPO: ${{ inputs.ci-platform-repo }}
      MAIN_BRANCH: ${{ inputs.main-branch }}
    if: github.event_name == 'push' &&
        !startsWith(github.ref, 'refs/tags/') &&
        github.ref != format('refs/heads/{0}', env.MAIN_BRANCH)
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: ${{ env.CI_PLATFORM_REPO }}/.github/actions/docker-build-push@main
        with:
          dockerfile-path: ${{ env.DOCKERFILE_PATH }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  # ---- Docker build release ----
  docker-build-release:
    name: Docker build (release)
    runs-on: ubuntu-latest
    needs: [unit-test]
    env:
      DOCKERFILE_PATH: ${{ inputs.dockerfile-path }}
      IMAGE_NAME: ${{ inputs.image-name }}
      CI_PLATFORM_REPO: ${{ inputs.ci-platform-repo }}
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: ${{ env.CI_PLATFORM_REPO }}/.github/actions/docker-build-push@main
        with:
          dockerfile-path: ${{ env.DOCKERFILE_PATH }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

  # ---- Trivy scan branch image ----
  trivy-image-branch:
    name: Trivy scan (branch image)
    runs-on: ubuntu-latest
    needs: [docker-build-branch]
    env:
      IMAGE_NAME: ${{ inputs.image-name }}
      CI_PLATFORM_REPO: ${{ inputs.ci-platform-repo }}
    if: github.event_name == 'push' &&
        !startsWith(github.ref, 'refs/tags/') &&
        github.ref != format('refs/heads/{0}', inputs.main-branch)
    permissions:
      contents: read
      packages: read
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: ${{ env.CI_PLATFORM_REPO }}/.github/actions/trivy-image@main
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ github.sha }}

  # ---- Trivy scan release image ----
  trivy-image-release:
    name: Trivy scan (release image)
    runs-on: ubuntu-latest
    needs: [docker-build-release]
    env:
      IMAGE_NAME: ${{ inputs.image-name }}
      CI_PLATFORM_REPO: ${{ inputs.ci-platform-repo }}
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: read
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: ${{ env.CI_PLATFORM_REPO }}/.github/actions/trivy-image@main
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ github.ref_name }}

  # ---- Semantic commit check ----
  semantic-commit-check:
    name: Semantic commit check
    runs-on: ubuntu-latest
    env:
      CI_PLATFORM_REPO: ${{ inputs.ci-platform-repo }}
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ${{ env.CI_PLATFORM_REPO }}/.github/actions/semantic-commit-check@main

  # ---- Semantic release ----
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    env:
      MAIN_BRANCH: ${{ inputs.main-branch }}
      CI_PLATFORM_REPO: ${{ inputs.ci-platform-repo }}
    if: github.event_name == 'push' &&
        github.ref == format('refs/heads/{0}', env.MAIN_BRANCH)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
          branch: ${{ env.MAIN_BRANCH }}
# Pipeline único – toda a lógica fica aqui (como o include do GitLab).
# O projeto só chama este workflow; quem decide o que rodar é o evento (push/PR/tag).
name: CI

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Docker image name (e.g. myorg/myapp)'
        required: true
        type: string
      dockerfile-path:
        required: false
        default: './Dockerfile'
        type: string
      coverage-path:
        required: false
        default: 'coverage.xml'
        type: string
      main-branch:
        required: false
        default: 'main'
        type: string
      ci-platform-repo:   # 👈 ISSO PRECISA EXISTIR
        required: false
        default: 'TourinhoM/org-ci-platform'
        type: string
      caller-event:
        required: true
        type: string
      caller-ref:
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: false
      DOCKER_PASSWORD:
        required: false
      SONAR_TOKEN:
        required: false
        
permissions:
  contents: read
  security-events: write
  actions: read
  packages: write

jobs:
  # ---- Push / PR: Trivy FS Scan ----
  trivy-fs:
    name: Trivy FS Scan
    runs-on: ubuntu-latest
    if: inputs.caller-event == 'push' || inputs.caller-event == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 👈 ESSENCIAL
      - uses: TourinhoM/org-ci-platform/.github/actions/trivy-fs@main

  # ---- SonarQube ----
  sonarqube:
    name: SonarQube
    needs: [trivy-fs]
    runs-on: ubuntu-latest
    if: >
      !startsWith(inputs.caller-ref, 'refs/tags/') &&
      inputs.caller-ref != format('refs/heads/{0}', inputs.main-branch)
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: TourinhoM/org-ci-platform/.github/actions/sonarqube@main
        with:
          coverage-path: ${{ inputs.coverage-path }}
          sonar-args: ""

  detect-dockerfile:
    name: Detect Dockerfile
    runs-on: ubuntu-latest
    outputs:
      has_dockerfile: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - id: check
        run: |
          if [ -f "${{ inputs.dockerfile-path }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
  prepare-image:
    name: Prepare image (tag dinâmico)
    runs-on: ubuntu-latest
    needs: [sonarqube, detect-dockerfile]
    if: >
      needs.detect-dockerfile.outputs.has_dockerfile == 'true' &&
      inputs.caller-event == 'push' && (
        (startsWith(inputs.caller-ref, 'refs/heads/') &&
        inputs.caller-ref != format('refs/heads/{0}', inputs.main-branch)) ||
        startsWith(inputs.caller-ref, 'refs/tags/')
      )
    outputs:
      image_repo: ${{ steps.env.outputs.repo }}
      image_tag: ${{ steps.env.outputs.tag }}
      push_tags: ${{ steps.env.outputs.push_tags }}
    steps:
      - id: env
        run: |
          REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "push_tags<<EOT" >> $GITHUB_OUTPUT
            echo "ghcr.io/$REPO:$TAG" >> $GITHUB_OUTPUT
            echo "ghcr.io/$REPO:latest" >> $GITHUB_OUTPUT
            echo "EOT" >> $GITHUB_OUTPUT
          else
            TAG="${{ github.sha }}"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "push_tags=ghcr.io/$REPO:$TAG" >> $GITHUB_OUTPUT
          fi

  # ---- Docker build → artefato ----
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [sonarqube, detect-dockerfile, prepare-image]
    if: >
      needs.detect-dockerfile.outputs.has_dockerfile == 'true' &&
      inputs.caller-event == 'push' && (
        (startsWith(inputs.caller-ref, 'refs/heads/') &&
        inputs.caller-ref != format('refs/heads/{0}', inputs.main-branch)) ||
        startsWith(inputs.caller-ref, 'refs/tags/')
      )
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: TourinhoM/org-ci-platform/.github/actions/docker-build-artifact@main
        with:
          image-ref: ghcr.io/${{ needs.prepare-image.outputs.image_repo }}:${{ needs.prepare-image.outputs.image_tag }}
          dockerfile-path: ${{ inputs.dockerfile-path }}

  # ---- Trivy scan (recebe artefato) ----
  trivy-image:
    name: Trivy container scan
    runs-on: ubuntu-latest
    needs: [docker-build, prepare-image, detect-dockerfile]
    if: >
      needs.detect-dockerfile.outputs.has_dockerfile == 'true' &&
      inputs.caller-event == 'push' && (
        (startsWith(inputs.caller-ref, 'refs/heads/') &&
        inputs.caller-ref != format('refs/heads/{0}', inputs.main-branch)) ||
        startsWith(inputs.caller-ref, 'refs/tags/')
      )
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
      - run: docker load -i image.tar
      - uses: TourinhoM/org-ci-platform/.github/actions/trivy-image@main
        with:
          image-ref: ghcr.io/${{ needs.prepare-image.outputs.image_repo }}:${{ needs.prepare-image.outputs.image_tag }}

  # ---- Docker push (após Trivy) ----
  docker-push:
    name: Docker push
    runs-on: ubuntu-latest
    needs: [trivy-image, prepare-image, detect-dockerfile]
    if: >
      needs.detect-dockerfile.outputs.has_dockerfile == 'true' &&
      inputs.caller-event == 'push' && (
        (startsWith(inputs.caller-ref, 'refs/heads/') &&
        inputs.caller-ref != format('refs/heads/{0}', inputs.main-branch)) ||
        startsWith(inputs.caller-ref, 'refs/tags/')
      )
    permissions:
      contents: read
      packages: write
    env:
      LOGIN_USERNAME: ${{ github.actor }}
      LOGIN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: TourinhoM/org-ci-platform/.github/actions/docker-push-artifact@main
        with:
          image-ref: ghcr.io/${{ needs.prepare-image.outputs.image_repo }}:${{ needs.prepare-image.outputs.image_tag }}
          push-tags: ${{ needs.prepare-image.outputs.push_tags }}
          registry: ghcr.io

  # ---- Semantic commit check ----
  semantic-commit-check:
    name: Semantic commit check
    runs-on: ubuntu-latest
    if: inputs.caller-event == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: TourinhoM/org-ci-platform/.github/actions/semantic-commit-check@main

  # ---- Semantic release ----
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: [sonarqube]
    if: inputs.caller-event == 'push' && inputs.caller-ref == format('refs/heads/{0}', inputs.main-branch)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
          branch: ${{ inputs.main-branch }}
# Pipeline único – toda a lógica fica aqui (como o include do GitLab).
# O projeto só chama este workflow; quem decide o que rodar é o evento (push/PR/tag).
name: CI

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        default: '3.11'
        type: string
      image-name:
        description: 'Docker image name (e.g. myorg/myapp)'
        required: true
        type: string
      dockerfile-path:
        required: false
        default: './Dockerfile'
        type: string
      coverage-path:
        required: false
        default: 'coverage.xml'
        type: string
      main-branch:
        required: false
        default: 'main'
        type: string
      ci-platform-repo:
        required: false
        default: 'YOUR_ORG/org-ci-platform'
        type: string
    secrets:
      DOCKER_USERNAME:
        required: false
      DOCKER_PASSWORD:
        required: false
      SONAR_TOKEN:
        required: false
      GITHUB_TOKEN:
        required: false

jobs:
  # ---- Push (main): segurança + testes + qualidade + build + scan imagem ----
  trivy-fs:
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', inputs.main-branch)
    name: Trivy FS Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ${{ inputs.ci-platform-repo }}/.github/actions/trivy-fs@main

  unit-test:
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', inputs.main-branch) || github.event_name == 'pull_request'
    name: Unit tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 1 }}
      - uses: ${{ inputs.ci-platform-repo }}/.github/actions/unit-test-python@main
        with:
          python-version: ${{ inputs.python-version }}
          coverage-path: ${{ inputs.coverage-path }}

  sonarqube:
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', inputs.main-branch) || github.event_name == 'pull_request'
    needs: [unit-test]
    name: SonarQube
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: ${{ inputs.ci-platform-repo }}/.github/actions/sonarqube@main
        with:
          coverage-path: ${{ inputs.coverage-path }}
          sonar-args: >-
            ${{ github.event_name == 'pull_request' && format('-Dsonar.pullrequest.key={0} -Dsonar.pullrequest.branch={1} -Dsonar.pullrequest.base={2}', github.event.pull_request.number, github.head_ref, inputs.main-branch) || '' }}

  docker-build:
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', inputs.main-branch)
    needs: [trivy-fs, unit-test]
    name: Docker build & push
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: ${{ inputs.ci-platform-repo }}/.github/actions/docker-build-push@main
        with:
          image-name: ${{ inputs.image-name }}
          dockerfile-path: ${{ inputs.dockerfile-path }}
          tags: ${{ inputs.image-name }}:latest,${{ inputs.image-name }}:${{ github.sha }}

  trivy-image-push:
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', inputs.main-branch)
    needs: [docker-build]
    name: Trivy container scan
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    steps:
      - name: Login to registry (scan de imagem privada)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: ${{ inputs.ci-platform-repo }}/.github/actions/trivy-image@main
        with:
          image-ref: ${{ inputs.image-name }}:${{ github.sha }}

  # ---- Tag: build + push imagem + scan ----
  docker-build-tag:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    name: Docker build & push (tag)
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: ${{ inputs.ci-platform-repo }}/.github/actions/docker-build-push@main
        with:
          image-name: ${{ inputs.image-name }}
          dockerfile-path: ${{ inputs.dockerfile-path }}
          tags: |
            ${{ inputs.image-name }}:${{ github.ref_name }}
            ${{ inputs.image-name }}:latest

  trivy-image-tag:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: [docker-build-tag]
    name: Trivy container scan (tag)
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    steps:
      - name: Login to registry (scan de imagem privada)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: ${{ inputs.ci-platform-repo }}/.github/actions/trivy-image@main
        with:
          image-ref: ${{ inputs.image-name }}:${{ github.ref_name }}

  # ---- PR: semantic commit check ----
  semantic-commit-check:
    if: github.event_name == 'pull_request'
    name: Semantic commit check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ${{ inputs.ci-platform-repo }}/.github/actions/semantic-commit-check@main

  # ---- Push main: semantic release (tag + release no GitHub) ----
  semantic-release:
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', inputs.main-branch)
    name: Semantic Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
          branch: ${{ inputs.main-branch }}

name: Helm Charts - PR (lint + bump)

# Gate de PR pra monorepo de charts: chart-testing (ct) linta SÓ os charts
# mudados (git diff) e FALHA se um chart mudou sem bumpar a version (ct.yaml:
# check-version-increment). É o que torna o versionamento manual seguro.
on:
  workflow_call:
    inputs:
      target-branch:
        description: Branch base pro diff de charts mudados
        required: false
        default: main
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # ct precisa do histórico pra diff vs target-branch
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      - uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
      - name: ct lint (charts mudados + enforce bump)
        shell: bash
        run: ct lint --config ct.yaml --target-branch "${{ inputs.target-branch }}"

name: CI - Semantic Release

on:
  workflow_call:
    secrets:
      RELEASE_APP_PRIVATE_KEY:
        required: false
        description: 'Private key (.pem) do GitHub App pra push de tag — sem ele, tag criada via GITHUB_TOKEN nao dispara workflows downstream (ci-tag.yml).'

# Release nao deve ser cancelado em meio ao processo (cria tag, release, changelog).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write       # necessário para criar tag
      issues: write
      pull-requests: write
    steps:
      # Gera install token efêmero do GitHub App (se var setada no consumer).
      # Sem o App token, semantic-release usa GITHUB_TOKEN padrão e a tag
      # criada NAO dispara workflows downstream (safety mecanismo do GitHub
      # contra loops). Com o App token, a tag dispara ci-tag.yml normalmente.
      - name: Generate app token
        if: vars.RELEASE_APP_ID != ''
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            conventional-changelog-conventionalcommits
          branch: main

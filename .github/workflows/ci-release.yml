name: CI - Semantic Release

on:
  workflow_call:
    secrets:
      RELEASE_APP_PRIVATE_KEY:
        required: false
        description: 'Private key (.pem) do GitHub App pra push de tag.'

# Release nao deve ser cancelado em meio ao processo (cria tag, release, changelog).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write       # necessário para criar tag
      issues: write
      pull-requests: write
    steps:
      # Gera install token efêmero do GitHub App (se var setada no consumer).
      # Sem o App token, semantic-release usa GITHUB_TOKEN padrão e a tag
      # criada NAO dispara workflows downstream (safety mecanismo do GitHub
      # contra loops). Com o App token, a tag dispara ci-tag.yml normalmente.
      - name: Generate app token
        if: vars.RELEASE_APP_ID != ''
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@16ca923e6ccbb50770c415a0ccd43709a8c5f7a4 # v4.2.2
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            conventional-changelog-conventionalcommits
          branch: main

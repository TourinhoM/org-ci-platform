# Reusable: Semantic Release (tag + GitHub Release on merge to main)
# Call from your repo on push to main to auto-tag and create release from conventional commits
name: Semantic Release

on:
  workflow_call:
    inputs:
      main-branch:
        required: false
        default: 'main'
        type: string
    secrets:
      GITHUB_TOKEN:
        required: true

jobs:
  release:
    name: Tag & Release
    runs-on: ubuntu-latest
    if: github.ref == format('refs/heads/{0}', inputs.main-branch)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
          branch: ${{ inputs.main-branch }}

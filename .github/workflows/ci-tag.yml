name: CI - Tag Release

on:
  workflow_call:
    inputs:
      dockerfile-path:
        required: false
        default: './Dockerfile'
        type: string
    secrets:
      RELEASE_APP_PRIVATE_KEY:
        required: false
        description: >
          Private key (.pem) do GitHub App RELEASE_APP, usada na promoção
          cross-repo da tag no gitops-<app> (job update-gitops). Secret
          acessado sob `secrets: inherit` precisa ser DECLARADO aqui pra
          popular — senão chega vazio (footgun do reusable workflow).

# Tag pipeline produz artefato versionado — nao cancelar em meio ao push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # -----------------------------
  # 1️⃣ Trivy FS
  # -----------------------------
  trivy-fs:
    name: Trivy FS Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: TourinhoM/org-ci-platform/.github/actions/trivy-fs@main

  # -----------------------------
  # 2️⃣ Trivy Config (Dockerfile lint)
  # -----------------------------
  trivy-config:
    name: Trivy Config Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: TourinhoM/org-ci-platform/.github/actions/trivy-config@main
        with:
          config-path: ${{ inputs.dockerfile-path }}

  # -----------------------------
  # 3️⃣ Prepare Image
  # -----------------------------
  prepare-image:
    name: Prepare image
    runs-on: ubuntu-latest
    needs: [trivy-fs, trivy-config]
    outputs:
      image_repo: ${{ steps.prepare.outputs.repo }}
      image_tag: ${{ steps.prepare.outputs.tag }}
      push_tags: ${{ steps.prepare.outputs.push_tags }}
    steps:
      - id: prepare
        uses: TourinhoM/org-ci-platform/.github/actions/prepare-image-tag@main

  # -----------------------------
  # 4️⃣ Docker Build
  # -----------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: prepare-image
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: TourinhoM/org-ci-platform/.github/actions/docker-build-artifact@main
        with:
          image-ref: ghcr.io/${{ needs.prepare-image.outputs.image_repo }}:${{ needs.prepare-image.outputs.image_tag }}
          dockerfile-path: ./Dockerfile

  # -----------------------------
  # 5️⃣ Trivy Image
  # -----------------------------
  trivy-image:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: [docker-build, prepare-image]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docker-image
      - run: docker load -i image.tar
      - uses: TourinhoM/org-ci-platform/.github/actions/trivy-image@main
        with:
          image-ref: ghcr.io/${{ needs.prepare-image.outputs.image_repo }}:${{ needs.prepare-image.outputs.image_tag }}

  # -----------------------------
  # 6️⃣ Docker Push
  # -----------------------------
  docker-push:
    name: Docker Push
    runs-on: ubuntu-latest
    needs: [trivy-image, prepare-image]
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    env:
      LOGIN_USERNAME: ${{ github.actor }}
      LOGIN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - id: push
        uses: TourinhoM/org-ci-platform/.github/actions/docker-push-artifact@main
        with:
          image-ref: ghcr.io/${{ needs.prepare-image.outputs.image_repo }}:${{ needs.prepare-image.outputs.image_tag }}
          push-tags: ${{ needs.prepare-image.outputs.push_tags }}
          registry: ghcr.io

  # -----------------------------
  # 7️⃣ Promove a tag no repo de deploy (gitops-<app>, cross-repo)
  # -----------------------------
  # O repo de deploy é separado do código (gitops-<app>), com os manifests na
  # raiz. A promoção bumpa o newTag lá via token efêmero do GitHub App
  # RELEASE_APP — o dev não precisa de write no gitops repo (separation of
  # duties: tag de imagem é output de CI, não edição manual).
  # Sem o App configurado (vars.RELEASE_APP_ID vazio), pula — não há como
  # escrever no repo separado.
  update-gitops:
    name: Promove tag → gitops-<app>
    runs-on: ubuntu-latest
    needs: [docker-push, prepare-image]
    if: vars.RELEASE_APP_ID != ''
    permissions:
      contents: read   # a escrita é no OUTRO repo, via token do App (não GITHUB_TOKEN)
    steps:
      - name: Gera app token (escopado ao gitops-<app>)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: gitops-${{ github.event.repository.name }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.repository_owner }}/gitops-${{ github.event.repository.name }}
          token: ${{ steps.app-token.outputs.token }}
          ref: main
          persist-credentials: true
          fetch-depth: 1
      # Manifests na raiz do repo de deploy → k8s-path: .
      - uses: TourinhoM/org-ci-platform/.github/actions/update-kustomize-image@main
        with:
          image-ref: ghcr.io/${{ needs.prepare-image.outputs.image_repo }}:${{ needs.prepare-image.outputs.image_tag }}
          k8s-path: .

  # -----------------------------
  # 8️⃣ Supply-chain attestations
  # -----------------------------
  # Tres steps independentes: cosign sign, SBOM attest, SLSA provenance.
  # Cada um detecta visibilidade do repo e adapta --tlog-upload:
  # - publico: assinatura/attestations vao pro Rekor publico (auditavel).
  # - privado: --tlog-upload=false, vivem so no GHCR junto a imagem.
  supply-chain:
    name: Supply chain attestations
    runs-on: ubuntu-latest
    needs: [docker-push, prepare-image]
    permissions:
      contents: read
      packages: write
      id-token: write    # OIDC para Fulcio (cosign keyless)
    steps:
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: TourinhoM/org-ci-platform/.github/actions/cosign-sign@main
        with:
          image-ref: ghcr.io/${{ needs.prepare-image.outputs.image_repo }}
          image-digest: ${{ needs.docker-push.outputs.digest }}

      - uses: TourinhoM/org-ci-platform/.github/actions/sbom-attest@main
        with:
          image-ref: ghcr.io/${{ needs.prepare-image.outputs.image_repo }}
          image-digest: ${{ needs.docker-push.outputs.digest }}

      - uses: TourinhoM/org-ci-platform/.github/actions/slsa-attest@main
        with:
          image-ref: ghcr.io/${{ needs.prepare-image.outputs.image_repo }}
          image-digest: ${{ needs.docker-push.outputs.digest }}

# Orchestrator: Tag pipeline (Docker build & push → Trivy image scan)
name: CI Tag

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      dockerfile-path:
        required: false
        default: './Dockerfile'
        type: string
      ci-platform-repo:
        required: false
        default: 'YOUR_ORG/org-ci-platform'
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

jobs:
  docker-build-push:
    name: Docker build & push
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: ${{ inputs.ci-platform-repo }}/.github/actions/docker-build-push@main
        with:
          image-name: ${{ inputs.image-name }}
          dockerfile-path: ${{ inputs.dockerfile-path }}
          tags: |
            ${{ inputs.image-name }}:${{ github.ref_name }}
            ${{ inputs.image-name }}:latest

  trivy-image:
    name: Trivy container scan
    needs: [docker-build-push]
    runs-on: ubuntu-latest
    steps:
      - name: Login to registry (scan de imagem privada)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: ${{ inputs.ci-platform-repo }}/.github/actions/trivy-image@main
        with:
          image-ref: ${{ inputs.image-name }}:${{ github.ref_name }}

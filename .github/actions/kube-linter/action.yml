# Best-practices check em manifests k8s — pega o que kubeconform nao
# pega: resources/limits ausentes, runAsRoot, capabilities perigosas,
# probes faltando, hostNetwork, ServiceAccount default, etc.
#
# Renderiza com kustomize-prepare antes de escanear: kube-linter scaneando
# o repo cru constroi cada kustomization.yaml standalone (incluindo base/
# sem newTag/patches), gerando findings duplicados e falsos.
#
# SARIF upload condicional: free tier privado falha upload — so sobe pra
# Security tab se repo publico.
#
# Versoes hardcoded; Renovate bumpa via regex manager.
# bump-via:
#   - https://github.com/stackrox/kube-linter-action/releases
#   - https://github.com/stackrox/kube-linter/releases
name: kube-linter
description: kube-linter best-practices scan em rendered Kustomize + SARIF upload condicional

runs:
  using: composite
  steps:
    - id: prep
      uses: TourinhoM/org-ci-platform/.github/actions/kustomize-prepare@main

    - name: Render kustomize trees
      shell: bash
      env:
        DIRS: ${{ steps.prep.outputs.entry-points }}
      run: |
        set -euo pipefail
        out=$(mktemp -d -t kube-linter-render.XXXXXX)
        while IFS= read -r dir; do
          [[ -z "$dir" ]] && continue
          echo "::group::kustomize build $dir"
          kustomize build "$dir" >> "$out/rendered.yaml"
          echo "::endgroup::"
        done <<< "$DIRS"
        echo "KUBE_LINTER_DIR=$out" >> "$GITHUB_ENV"

    - name: kube-linter scan (console + gate)
      uses: stackrox/kube-linter-action@87802a2f4e01abebb3ee3c67a3002fea71f6eae5 # v1.0.7
      with:
        directory: ${{ env.KUBE_LINTER_DIR }}
        format: plain
        version: v0.8.3

    - name: kube-linter scan (SARIF)
      if: always()
      uses: stackrox/kube-linter-action@87802a2f4e01abebb3ee3c67a3002fea71f6eae5 # v1.0.7
      with:
        directory: ${{ env.KUBE_LINTER_DIR }}
        format: sarif
        output-file: kube-linter-results.sarif
        version: v0.8.3

    # Resumo legivel no GitHub Step Summary (link "View summary" no job).
    # Agrupa por regra (mais comum primeiro) + tabela detalhada colapsavel.
    # Roda em always() pra surfacar findings mesmo quando o gate falhou.
    - name: Summarize findings
      if: always()
      shell: bash
      run: |
        set -euo pipefail
        [[ -s kube-linter-results.sarif ]] || exit 0

        count=$(jq '.runs[0].results | length' kube-linter-results.sarif)

        {
          if [[ "$count" -eq 0 ]]; then
            echo "## kube-linter: PASS (0 findings)"
          else
            echo "## kube-linter: $count findings"
            echo ""
            echo "| Rule | Count |"
            echo "|------|-------|"
            jq -r '.runs[0].results | group_by(.ruleId) | sort_by(-length) | .[] | "| `\(.[0].ruleId)` | \(length) |"' kube-linter-results.sarif
            echo ""
            echo "<details><summary>Detalhes (clique pra expandir)</summary>"
            echo ""
            echo "| Rule | Object | Mensagem |"
            echo "|------|--------|----------|"
            jq -r '.runs[0].results[] | "| `\(.ruleId)` | `\(.locations[0].logicalLocations[0].name // "?")` | \(.message.text | gsub("\n"; " ")) |"' kube-linter-results.sarif
            echo ""
            echo "</details>"
          fi
        } >> "$GITHUB_STEP_SUMMARY"

        [[ "$count" -eq 0 ]] || echo "::warning::kube-linter found $count findings (see Step Summary)"

    - name: Upload kube-linter SARIF to Security tab
      if: always() && github.event.repository.visibility == 'public'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: kube-linter-results.sarif
        category: kube-linter

# Single responsibility: best-practices check em manifests k8s usando
# kube-linter (StackRox/Red Hat). Pega o que kubeconform NAO pega:
# resources/limits ausentes, runAsRoot, capabilities perigosas, probes
# faltando, hostNetwork, ServiceAccount default, etc.
#
# Wrapper thin sobre stackrox/kube-linter-action: passamos diretorio + config
# opcional do consumer. SARIF upload condicional segue mesma logica de trivy-fs
# (so sobe pra Security tab se repo for public, pra evitar erro em free tier).
name: kube-linter
description: kube-linter (StackRox) best-practices scan + SARIF upload condicional

inputs:
  directory:
    description: 'Diretorio a varrer. Aceita kustomize, helm rendered, ou raw YAML.'
    required: false
    default: '.'
  config:
    description: 'Path para .kube-linter.yaml custom no repo do caller. Vazio = defaults.'
    required: false
    default: ''
  version:
    description: 'Versao do kube-linter (prefixo "v" obrigatorio: tags upstream sao v0.8.x).'
    required: false
    default: 'v0.8.3'

runs:
  using: composite
  steps:
    - name: kube-linter scan (console + gate)
      uses: stackrox/kube-linter-action@87802a2f4e01abebb3ee3c67a3002fea71f6eae5 # v1.0.7
      with:
        directory: ${{ inputs.directory }}
        config: ${{ inputs.config }}
        format: plain
        version: ${{ inputs.version }}

    - name: kube-linter scan (SARIF)
      if: always()
      uses: stackrox/kube-linter-action@87802a2f4e01abebb3ee3c67a3002fea71f6eae5 # v1.0.7
      with:
        directory: ${{ inputs.directory }}
        config: ${{ inputs.config }}
        format: sarif
        output-file: kube-linter-results.sarif
        version: ${{ inputs.version }}

    - name: Upload kube-linter SARIF to Security tab
      if: always() && github.event.repository.visibility == 'public'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: kube-linter-results.sarif
        category: kube-linter

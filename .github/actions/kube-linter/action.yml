# Single responsibility: best-practices check em manifests k8s usando
# kube-linter (StackRox/Red Hat). Pega o que kubeconform NAO pega:
# resources/limits ausentes, runAsRoot, capabilities perigosas, probes
# faltando, hostNetwork, ServiceAccount default, etc.
#
# Zero-input: kube-linter auto-detecta kustomization.yaml E auto-carrega
# .kube-linter.yaml do repo se existir (sem precisar input config).
#
# SARIF upload condicional: free tier privado falha upload — so sobe pra
# Security tab se repo publico (mesma logica defensiva de trivy-fs).
#
# Versoes hardcoded — Renovate (Fase 5) bumpa via regex manager.
# bump-via:
#   - https://github.com/stackrox/kube-linter-action/releases
#   - https://github.com/stackrox/kube-linter/releases
name: kube-linter
description: kube-linter best-practices scan + SARIF upload condicional

runs:
  using: composite
  steps:
    - name: kube-linter scan (console + gate)
      uses: stackrox/kube-linter-action@87802a2f4e01abebb3ee3c67a3002fea71f6eae5 # v1.0.7
      with:
        directory: '.'
        format: plain
        version: v0.8.3

    - name: kube-linter scan (SARIF)
      if: always()
      uses: stackrox/kube-linter-action@87802a2f4e01abebb3ee3c67a3002fea71f6eae5 # v1.0.7
      with:
        directory: '.'
        format: sarif
        output-file: kube-linter-results.sarif
        version: v0.8.3

    # Resumo legivel no GitHub Step Summary (link "View summary" no job).
    # Agrupa por regra (mais comum primeiro) + tabela detalhada colapsavel.
    # Roda em always() pra surfacar findings mesmo quando o gate falhou.
    - name: Summarize findings
      if: always()
      shell: bash
      run: |
        set -euo pipefail
        [[ -s kube-linter-results.sarif ]] || exit 0

        count=$(jq '.runs[0].results | length' kube-linter-results.sarif)

        {
          if [[ "$count" -eq 0 ]]; then
            echo "## kube-linter: PASS (0 findings)"
          else
            echo "## kube-linter: $count findings"
            echo ""
            echo "| Rule | Count |"
            echo "|------|-------|"
            jq -r '.runs[0].results | group_by(.ruleId) | sort_by(-length) | .[] | "| `\(.[0].ruleId)` | \(length) |"' kube-linter-results.sarif
            echo ""
            echo "<details><summary>Detalhes (clique pra expandir)</summary>"
            echo ""
            echo "| Rule | Object | Mensagem |"
            echo "|------|--------|----------|"
            jq -r '.runs[0].results[] | "| `\(.ruleId)` | `\(.locations[0].logicalLocations[0].name // "?")` | \(.message.text | gsub("\n"; " ")) |"' kube-linter-results.sarif
            echo ""
            echo "</details>"
          fi
        } >> "$GITHUB_STEP_SUMMARY"

        [[ "$count" -eq 0 ]] || echo "::warning::kube-linter found $count findings (see Step Summary)"

    - name: Upload kube-linter SARIF to Security tab
      if: always() && github.event.repository.visibility == 'public'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: kube-linter-results.sarif
        category: kube-linter

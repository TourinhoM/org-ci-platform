name: Prepare Image Tag
description: Generate Docker image repo, tag and push tags

inputs:
  registry:
    description: Container registry
    required: false
    default: ghcr.io

outputs:
  repo:
    description: Normalized repository name
    value: ${{ steps.set.outputs.repo }}
  tag:
    description: Image tag
    value: ${{ steps.set.outputs.tag }}
  push_tags:
    description: Tags to push
    value: ${{ steps.set.outputs.push_tags }}

runs:
  using: "composite"
  steps:
    - id: set
      shell: bash
      run: |
        set -euo pipefail

        REPO=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
        REGISTRY="${{ inputs.registry }}"

        echo "repo=$REPO" >> "$GITHUB_OUTPUT"

        if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          TAG="${GITHUB_REF_NAME}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          {
            echo "push_tags<<EOF"
            echo "$REGISTRY/$REPO:$TAG"
            echo "$REGISTRY/$REPO:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

        else
          TAG="${GITHUB_SHA}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "push_tags=$REGISTRY/$REPO:$TAG" >> "$GITHUB_OUTPUT"
        fi

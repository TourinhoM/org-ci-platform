# Single responsibility: Trivy config scan em manifests Kubernetes
# (CIS Kubernetes Benchmark + NSA Hardening Guide).
#
# Action OPINIONADA: usa kustomize-prepare pra renderizar antes do scan.
# Razao: patches strategic-merge sao fragmentos. Trivy escaneando-os
# standalone gera falsos positivos massivos de campos sobrepostos pelo
# merge (securityContext, readOnlyRootFilesystem, etc.).
#
# Zero-input: pega tudo via kustomize-prepare.
# Estrutura espelha trivy-config/trivy-fs:
#   - 1a chamada: console + gate via Rego (HIGH/CRITICAL = fail)
#   - 2a chamada: SARIF (todas severidades) -> Security tab se publico
name: Trivy K8s Misconfig
description: Trivy config scan em rendered Kustomize (CIS + NSA) com gate Rego e SARIF

runs:
  using: composite
  steps:
    - id: prep
      uses: TourinhoM/org-ci-platform/.github/actions/kustomize-prepare@main

    # Renderiza todos os entry points em UM rendered.yaml.
    # Concatenar simplifica: Trivy escaneia 1 path em vez de N.
    # Localizacao do finding fica no campo "object" do SARIF.
    # GITHUB_ENV propaga path pros steps Trivy seguintes.
    #
    # `echo "---"` antes de cada build: kustomize nao emite separador no
    # inicio/fim do output, so entre docs do mesmo build. Sem isso,
    # concatenar 2+ entry-points funde o ultimo doc do anterior com o
    # primeiro do seguinte, fazendo parsers descartarem o arquivo.
    #
    # touch .trivyignore: trivy-action passa `--ignorefile <path>` cru pro
    # binario, que falha se o arquivo nao existir. Garantir um vazio mantem
    # a action plug-and-play (consumer so cria .trivyignore se tiver
    # exception pra documentar — ver deploy-argocd).
    - name: Render kustomize trees
      shell: bash
      env:
        DIRS: ${{ steps.prep.outputs.entry-points }}
      run: |
        set -euo pipefail
        out=$(mktemp -d -t trivy-k8s-render.XXXXXX)
        while IFS= read -r dir; do
          [[ -z "$dir" ]] && continue
          echo "::group::kustomize build $dir"
          echo "---" >> "$out/rendered.yaml"
          kustomize build "$dir" >> "$out/rendered.yaml"
          echo "::endgroup::"
        done <<< "$DIRS"
        echo "TRIVY_SCAN_REF=$out" >> "$GITHUB_ENV"
        touch "$GITHUB_WORKSPACE/.trivyignore"

    - name: Trivy k8s misconfig scan (console + gate)
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        scan-type: 'config'
        scan-ref: ${{ env.TRIVY_SCAN_REF }}
        format: 'table'
        ignore-policy: ${{ github.action_path }}/policy.rego
        trivyignores: ${{ github.workspace }}/.trivyignore
        exit-code: '1'

    - name: Trivy k8s misconfig scan (SARIF)
      if: always()
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        scan-type: 'config'
        scan-ref: ${{ env.TRIVY_SCAN_REF }}
        format: 'sarif'
        output: 'trivy-k8s-results.sarif'
        trivyignores: ${{ github.workspace }}/.trivyignore

    - name: Upload Trivy K8s SARIF to Security tab
      if: always() && github.event.repository.visibility == 'public'
      uses: github/codeql-action/upload-sarif@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
      with:
        sarif_file: 'trivy-k8s-results.sarif'
        category: trivy-k8s

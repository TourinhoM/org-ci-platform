# Single responsibility: Trivy filesystem scan + upload SARIF
name: Trivy FS Scan
description: Run Trivy filesystem scan and upload SARIF to GitHub Security tab

inputs:
  scan-ref:
    description: 'Path to scan (default repo root)'
    required: false
    default: '.'
  severity:
    description: 'Severities to report'
    required: false
    default: 'CRITICAL,HIGH'

runs:
  using: composite
  steps:
    # Step 1: imprimir no console
    - name: Run Trivy filesystem scan (console)
      uses: aquasecurity/trivy-action@0.24.0
      with:
        scan-type: 'fs'
        scan-ref: ${{ inputs.scan-ref }}
        format: 'table'        # imprime no terminal
        severity: ${{ inputs.severity }}
        skip-dirs: .git
        ignore-unfixed: true
        scanners: vuln,secret,misconfig
        args: --skip-vcs


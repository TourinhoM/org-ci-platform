# Single responsibility: Trivy filesystem scan with severity gate via Rego policy.
# - 1st call: console output + gate (HIGH/CRITICAL fail via Rego ignore-policy)
# - 2nd call: SARIF output (all severities, no filter) -> uploaded to Security tab
#   if repo is public (or has GHAS).
name: Trivy FS Scan
description: Trivy filesystem scan + Rego policy gate + SARIF upload (conditional)

inputs:
  scan-ref:
    description: 'Path to scan'
    required: false
    default: '.'

runs:
  using: composite
  steps:
    # Display + gate: log mostra todas severidades, exit-code so dispara em HIGH/CRITICAL
    # via policy.rego que filtra UNKNOWN/LOW/MEDIUM.
    - name: Trivy filesystem scan (console + gate)
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        scan-type: 'fs'
        scan-ref: ${{ inputs.scan-ref }}
        format: 'table'
        skip-dirs: .git
        ignore-unfixed: true
        scanners: vuln,secret
        ignore-policy: ${{ github.action_path }}/policy.rego
        exit-code: '1'

    # SARIF: roda mesmo se gate acima falhou, pra alimentar a Security tab.
    # Sem ignore-policy aqui — queremos todas severidades reportadas.
    - name: Trivy filesystem scan (SARIF)
      if: always()
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        scan-type: 'fs'
        scan-ref: ${{ inputs.scan-ref }}
        format: 'sarif'
        output: 'trivy-fs-results.sarif'
        skip-dirs: .git
        ignore-unfixed: true
        scanners: vuln,secret

    # Upload condicional: GitHub Code Scanning e gratis em repos publicos;
    # em privado free tier o upload falha. Skipar quando privado evita ruido.
    - name: Upload Trivy FS SARIF to Security tab
      if: always() && github.event.repository.visibility == 'public'
      uses: github/codeql-action/upload-sarif@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
      with:
        sarif_file: 'trivy-fs-results.sarif'
        category: trivy-fs

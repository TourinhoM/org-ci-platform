# Single responsibility: Trivy filesystem scan + upload SARIF
name: Trivy FS Scan
description: Run Trivy filesystem scan and upload SARIF to GitHub Security tab

inputs:
  scan-ref:
    required: false
    default: '.'

runs:
  using: composite
  steps:
    # Display: log mostra todas severidades.
    # Gate: policy.rego ignora UNKNOWN/LOW/MEDIUM, então exit-code só dispara em HIGH/CRITICAL.
    - name: Run Trivy filesystem scan (console)
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        scan-type: 'fs'
        scan-ref: ${{ inputs.scan-ref }}
        format: 'table'
        skip-dirs: .git
        ignore-unfixed: true
        scanners: vuln,secret,misconfig
        ignore-policy: ${{ github.action_path }}/policy.rego
        exit-code: '1'


# Instala kustomize e descobre entry points top-level — dirs com
# kustomization.yaml que nao sao consumidas por outra kustomization.
#
# Versao hardcoded; Renovate bumpa via regex manager.
# bump-via: https://github.com/kubernetes-sigs/kustomize/releases
name: Kustomize Prepare
description: Install kustomize + auto-discovery de kustomization.yaml top-level

outputs:
  entry-points:
    description: 'Dirs com kustomization.yaml top-level (um por linha).'
    value: ${{ steps.discover.outputs.entry-points }}

runs:
  using: composite
  steps:
    - name: Install kustomize
      shell: bash
      run: |
        set -euo pipefail
        VERSION=5.8.1
        curl -sSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${VERSION}/kustomize_v${VERSION}_linux_amd64.tar.gz" \
          | sudo tar -xz -C /usr/local/bin kustomize

    - name: Discover top-level entry points
      id: discover
      shell: bash
      run: |
        set -euo pipefail

        # Lista dirs com kustomization.yaml, ordenados lex.
        mapfile -t candidates < <(
          find . \( -name kustomization.yaml -o -name kustomization.yml \) \
            -printf '%h\n' | sort -u
        )


        # Marca dirs consumidos como base/component por outra kustomization.
        # Sem isso, base/ e overlays/lab/ viram ambos entry points — base
        # renderiza standalone, gerando findings duplicados e falsos.
        declare -A referenced=()

        for cand in "${candidates[@]}"; do
          kfile="$cand/kustomization.yaml"
          [[ -f "$kfile" ]] || kfile="$cand/kustomization.yml"

          # grep das entradas '- <path>' do kustomization; o filtro
          # `[[ -d "$ref" ]]` descarta URLs, .yaml individuais e itens
          # tipo '- key: value' de patches.
          while IFS= read -r ref; do
            [[ -z "$ref" ]] && continue
            target=$(cd "$cand" && [[ -d "$ref" ]] && cd "$ref" && pwd) || continue
            rel=$(realpath --relative-to="." "$target")
            referenced["./$rel"]=1
          done < <(
            grep -E '^\s*-\s+\S' "$kfile" \
              | sed -E 's/^\s*-\s*//; s/\s*#.*$//; s/\s*$//'
          )
        done


        # Aceita candidato se nao-nested E nao-referenciado. Rejeitados
        # viram skip-prefix pra excluir descendentes tambem.
        accepted=()
        skip_prefixes=()

        for dir in "${candidates[@]}"; do
          skip=false
          for sp in "${skip_prefixes[@]}"; do
            [[ "$dir" == "$sp"/* ]] && { skip=true; break; }
          done
          $skip && continue

          if [[ -n "${referenced[$dir]+x}" ]]; then
            skip_prefixes+=("$dir")
            continue
          fi

          accepted+=("$dir")
          skip_prefixes+=("$dir")
        done


        if [[ ${#accepted[@]} -eq 0 ]]; then
          echo "::error::Nenhum kustomization.yaml encontrado no repo."
          exit 1
        fi


        # Output multi-linha via heredoc.
        {
          echo "entry-points<<EOF"
          printf '%s\n' "${accepted[@]}"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

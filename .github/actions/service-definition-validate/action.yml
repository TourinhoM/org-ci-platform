# Single responsibility: valida o service definition (service.yaml) contra o
# JSON Schema do contrato da plataforma.
# - Arquivo ausente -> no-op com ::notice:: (rollout não-quebra: consumer
#   pré-contrato continua verde até migrar).
# - Mensagem de erro é a interface com dev que não conhece k8s: texto plano
#   + Step Summary com a referência de campos e o caminho pra pedir campo novo.
# O schema mora junto da action (github.action_path): uma fonte de verdade,
# versionada no mesmo commit que o enforcement que a aplica.
name: Service Definition Validate
description: Valida service.yaml contra o JSON Schema do contrato da plataforma

inputs:
  file:
    description: 'Caminho do service definition no repo consumer'
    required: false
    default: 'service.yaml'

runs:
  using: composite
  steps:
    - name: Detect service definition
      shell: bash
      run: |
        if [ -f "${GITHUB_WORKSPACE}/${{ inputs.file }}" ]; then
          echo "SD_PRESENT=true" >> "$GITHUB_ENV"
        else
          echo "SD_PRESENT=false" >> "$GITHUB_ENV"
          echo "::notice file=${{ inputs.file }}::${{ inputs.file }} ausente — validação de contrato pulada (repo pré-contrato)."
        fi

    # YAML -> JSON em step próprio: erro de sintaxe YAML ganha mensagem
    # dedicada em vez de vazar stack trace do validador de schema.
    - name: Convert YAML to JSON
      if: env.SD_PRESENT == 'true'
      shell: bash
      run: |
        if ! python3 -c 'import json,sys,yaml; json.dump(yaml.safe_load(open(sys.argv[1])), open(sys.argv[2], "w"))' \
            "${GITHUB_WORKSPACE}/${{ inputs.file }}" /tmp/service-definition.json 2>/tmp/yaml-err.txt; then
          {
            echo "## ❌ ${{ inputs.file }}: YAML inválido"
            echo "O arquivo não é YAML válido — erro de sintaxe antes mesmo do contrato:"
            echo '```'
            cat /tmp/yaml-err.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::error file=${{ inputs.file }}::YAML inválido — detalhes no Step Summary."
          exit 1
        fi

    # ajv-cli via npx com versão exata (equivalente npm do SHA pinning;
    # não é GitHub Action, então Dependabot não bumpa — revisar junto do schema).
    - name: Validate against schema
      if: env.SD_PRESENT == 'true'
      shell: bash
      run: |
        set +e
        out=$(npx --yes ajv-cli@5.0.0 validate \
          -s "${{ github.action_path }}/schema.json" \
          -d /tmp/service-definition.json \
          --all-errors --errors=text 2>&1)
        code=$?
        set -e
        if [ "$code" -ne 0 ]; then
          {
            echo "## ❌ ${{ inputs.file }} não passou no contrato da plataforma"
            echo '```'
            echo "$out" | sed 's|/tmp/service-definition.json|${{ inputs.file }}|g'
            echo '```'
            echo "### Campos aceitos"
            echo "| Campo | Tipo | Valores |"
            echo "|-------|------|---------|"
            echo "| name (obrigatório) | string | kebab-case, até 40 chars |"
            echo "| size | string | small · medium · large |"
            echo "| http | boolean | true / false |"
            echo "| env | mapa | CHAVE_MAIUSCULA: \"valor string\" |"
            echo "| capabilities | lista | database · cache |"
            echo
            echo "Campo fora dessa lista é recusado de propósito (contrato fechado)."
            echo "Precisa de algo que o contrato não cobre? Abra uma issue no"
            echo "org-ci-platform com a label \`service-definition\` descrevendo o caso."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "$out"
          echo "::error file=${{ inputs.file }}::service definition inválido — detalhes no Step Summary."
          exit 1
        fi
        echo "::notice::${{ inputs.file }} válido no contrato da plataforma."

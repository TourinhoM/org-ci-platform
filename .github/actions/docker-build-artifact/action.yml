# Build image, save to tar, upload as artifact (no push)
name: Docker Build Artifact
description: Build image and save as artifact for later scan + push

inputs:
  image-ref:
    description: 'Full image:tag (e.g. ghcr.io/org/repo:sha)'
    required: true
  dockerfile-path:
    required: false
    default: './Dockerfile'

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build (no push)
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ${{ inputs.dockerfile-path }}
        push: false
        load: true
        tags: ${{ inputs.image-ref }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Save image to tar
      run: docker save ${{ inputs.image-ref }} -o image.tar
      shell: bash

    - name: Upload image artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: image.tar
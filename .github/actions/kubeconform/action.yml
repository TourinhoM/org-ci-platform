# Single responsibility: schema validation de manifests k8s contra a API
# oficial + CRDs publicos (Argo CD, External Secrets, Prometheus Operator,
# cert-manager, Traefik) via catalog datreeio/CRDs-catalog.
#
# Zero-input: usa kustomize-prepare pra auto-discovery.
# Versao do kubeconform hardcoded — Renovate (Fase 5) bumpa via regex manager.
# bump-via: https://github.com/yannh/kubeconform/releases
name: Kubeconform
description: Schema validation k8s API + CRDs catalog (datreeio) com auto-discovery Kustomize

runs:
  using: composite
  steps:
    - id: prep
      uses: TourinhoM/org-ci-platform/.github/actions/kustomize-prepare@main

    - name: Install + run kubeconform
      shell: bash
      env:
        DIRS: ${{ steps.prep.outputs.entry-points }}
      run: |
        set -euo pipefail

        VERSION=0.7.0
        curl -sSL "https://github.com/yannh/kubeconform/releases/download/v${VERSION}/kubeconform-linux-amd64.tar.gz" \
          | sudo tar -xz -C /usr/local/bin kubeconform

        # CRDs catalog (datreeio) cobre Argo CD, ESO, Prometheus Operator,
        # cert-manager, Traefik etc. -ignore-missing-schemas evita falha em
        # CRDs raros nao publicados no catalog (Bitwarden, Keycloak Operator).
        CRD_SCHEMA='https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
        FLAGS=(
          -strict
          -ignore-missing-schemas
          -kubernetes-version master
          -schema-location default
          -schema-location "$CRD_SCHEMA"
          -summary -output text
        )

        # Cada dir validado independente. Loop nao para no primeiro fail —
        # coleta tudo pra dar visibilidade total ao usuario num run.
        fail=0
        while IFS= read -r dir; do
          [[ -z "$dir" ]] && continue
          echo "::group::$dir"
          if ! kustomize build "$dir" | kubeconform "${FLAGS[@]}" -; then
            fail=1
          fi
          echo "::endgroup::"
        done <<< "$DIRS"
        exit "$fail"

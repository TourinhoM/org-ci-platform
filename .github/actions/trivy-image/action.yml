# Single responsibility: Trivy container image scan + upload SARIF
name: Trivy Image Scan
description: Scan container image with Trivy and upload SARIF

inputs:
  image-ref:
    required: true

runs:
  using: composite
  steps:
    # Display: log mostra todas severidades.
    # Gate: policy.rego ignora UNKNOWN/LOW/MEDIUM, então exit-code só dispara em HIGH/CRITICAL.
    - name: Run Trivy image scan (console)
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: ${{ inputs.image-ref }}
        format: 'table'
        ignore-policy: ${{ github.action_path }}/policy.rego
        exit-code: '1'


# Single responsibility: Trivy container image scan with severity gate via Rego policy.
# - 1st call: console output + gate (HIGH/CRITICAL fail via Rego ignore-policy)
# - 2nd call: SARIF output (all severities, no filter) -> uploaded to Security tab
#   if repo is public (or has GHAS).
#
# Auto-discovery de policy por repo: se existir trivy-policy.rego na raiz do repo
# chamador ($GITHUB_WORKSPACE), ele é usado em vez da policy padrão da plataforma.
# Isso permite cada repo ter suas próprias exceções OPA sem alterar a política global.
name: Trivy Image Scan
description: Trivy image scan + Rego policy gate + SARIF upload (conditional)

inputs:
  image-ref:
    description: 'Image reference (e.g. ghcr.io/org/repo:tag)'
    required: true

runs:
  using: composite
  steps:
    - name: Resolve policy and ignore files
      shell: bash
      run: |
        CUSTOM_POLICY="${GITHUB_WORKSPACE}/trivy-policy.rego"
        if [ -f "$CUSTOM_POLICY" ]; then
          echo "Using repo-level policy: $CUSTOM_POLICY"
          echo "TRIVY_POLICY=$CUSTOM_POLICY" >> "$GITHUB_ENV"
        else
          echo "TRIVY_POLICY=${{ github.action_path }}/policy.rego" >> "$GITHUB_ENV"
        fi

        IGNOREFILE="${GITHUB_WORKSPACE}/.trivyignore"
        if [ -f "$IGNOREFILE" ]; then
          echo "Using repo-level .trivyignore"
          echo "TRIVY_IGNOREFILE=$IGNOREFILE" >> "$GITHUB_ENV"
        else
          echo "TRIVY_IGNOREFILE=" >> "$GITHUB_ENV"
        fi

    - name: Trivy image scan (console + gate)
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        image-ref: ${{ inputs.image-ref }}
        format: 'table'
        ignore-policy: ${{ env.TRIVY_POLICY }}
        trivyignores: ${{ env.TRIVY_IGNOREFILE }}
        exit-code: '1'

    - name: Trivy image scan (SARIF)
      if: always()
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        image-ref: ${{ inputs.image-ref }}
        format: 'sarif'
        output: 'trivy-image-results.sarif'

    - name: Upload Trivy image SARIF to Security tab
      if: always() && github.event.repository.visibility == 'public'
      uses: github/codeql-action/upload-sarif@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
      with:
        sarif_file: 'trivy-image-results.sarif'
        category: trivy-image

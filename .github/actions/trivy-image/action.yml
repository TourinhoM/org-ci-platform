# Single responsibility: Trivy container image scan + upload SARIF
name: Trivy Image Scan
description: Scan container image with Trivy and upload SARIF

inputs:
  image-ref:
    description: 'Image reference (e.g. myorg/myapp:sha or :tag)'
    required: true
  severity:
    required: false
    default: 'CRITICAL,HIGH'

runs:
  using: composite
  steps:
    - name: Run Trivy image scan (console)
      uses: aquasecurity/trivy-action@v0.24.0
      with:
        image-ref: ${{ inputs.image-ref }}
        format: 'table'
        severity: ${{ inputs.severity }}


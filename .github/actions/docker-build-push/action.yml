# Single responsibility: Docker build and push to registry
# Requires DOCKER_USERNAME, DOCKER_PASSWORD in env when calling
name: Docker Build & Push
description: Build image and push to Docker Hub (or private registry)

inputs:
  image-name:
    description: 'Full image name (e.g. myorg/myapp)'
    required: true
  dockerfile-path:
    required: false
    default: './Dockerfile'
  tags:
    description: 'Tags to push (comma-separated or multiline)'
    required: true

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      env:
        DOCKER_USERNAME: ${{ env.DOCKER_USERNAME }}
        DOCKER_PASSWORD: ${{ env.DOCKER_PASSWORD }}
      with:
        username: ${{ env.DOCKER_USERNAME }}
        password: ${{ env.DOCKER_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ${{ inputs.dockerfile-path }}
        push: true
        tags: ${{ inputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

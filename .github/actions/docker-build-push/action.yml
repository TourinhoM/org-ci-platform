name: Docker Build & Push (GHCR)
description: Build image and push to GitHub Container Registry

inputs:
  image-name:
    description: 'Full image name (e.g. ghcr.io/org/app)'
    required: true
  dockerfile-path:
    required: false
    default: './Dockerfile'
  tags:
    description: 'Tags to push (comma-separated or multiline)'
    required: true

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ${{ inputs.dockerfile-path }}
        push: true
        tags: ${{ inputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
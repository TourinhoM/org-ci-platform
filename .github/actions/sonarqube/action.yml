name: SonarCloud Scan
description: Download coverage (se existir) e roda SonarCloud scan

inputs:
  sonar-organization:
    required: true
  coverage-path:
    required: false
    default: 'coverage.xml'
  sonar-args:
    required: false
    default: ''

runs:
  using: composite
  steps:

    # 0️⃣ Garante que variáveis obrigatórias existem
    - name: Validar variáveis obrigatórias
      shell: bash
      run: |
        if [ -z "$SONAR_TOKEN" ]; then
          echo "❌ SONAR_TOKEN não definido"
          exit 1
        fi

        if [ -z "${{ inputs.sonar-organization }}" ]; then
          echo "❌ sonar-organization não definido"
          exit 1
        fi

        # exporta input para variável de ambiente que será usada depois
        echo "SONAR_ORG=${{ inputs.sonar-organization }}" >> $GITHUB_ENV

    # 1️⃣ Sanitiza automaticamente o project key
    - name: Sanitizar sonar.projectKey
      shell: bash
      run: |
        SANITIZED_KEY=$(echo "${{ github.repository }}" | sed 's#[^a-zA-Z0-9_]#_#g')
        echo "SONAR_PROJECT_KEY=$SANITIZED_KEY" >> $GITHUB_ENV

    # 2️⃣ Download coverage (opcional)
    - name: Download coverage (opcional)
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        name: coverage

    # 3️⃣ Define args de coverage se existir
    - name: Definir args de coverage
      shell: bash
      run: |
        if [ -f "${{ inputs.coverage-path }}" ]; then
          echo "COVERAGE_ARGS=-Dsonar.python.coverage.reportPaths=${{ inputs.coverage-path }}" >> $GITHUB_ENV
        else
          echo "COVERAGE_ARGS=" >> $GITHUB_ENV
        fi

    # 4️⃣ SonarCloud
    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v2
      env:
        SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        SONAR_HOST_URL: https://sonarcloud.io
        SONAR_ORG: ${{ env.SONAR_ORG }}
      with:
        args: >
          -Dsonar.organization=${{ env.SONAR_ORG }}
          -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
          -Dsonar.sources=.
          ${{ env.COVERAGE_ARGS }}
          ${{ inputs.sonar-args }}
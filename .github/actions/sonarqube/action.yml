name: SonarCloud Scan
description: Download coverage (se existir) e roda SonarCloud scan

inputs:
  sonar-organization:
    description: SonarCloud organization key
    required: true

  coverage-path:
    required: false
    default: 'coverage.xml'

  sonar-args:
    required: false
    default: ''

runs:
  using: composite
  steps:

    # 1️⃣ Sanitiza automaticamente o project key
    - name: Sanitizar sonar.projectKey
      shell: bash
      run: |
        # Substitui qualquer caractere inválido por "_"
        SANITIZED_KEY=$(echo "${{ github.repository }}" | sed 's#[^a-zA-Z0-9_]#_#g')
        echo "SONAR_PROJECT_KEY=$SANITIZED_KEY" >> $GITHUB_ENV

    # 2️⃣ Tenta baixar coverage (não falha se não existir)
    - name: Download coverage (opcional)
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        name: coverage

    # 3️⃣ Define args de coverage apenas se o arquivo existir
    - name: Definir args de coverage
      shell: bash
      run: |
        if [ -f "${{ inputs.coverage-path }}" ]; then
          echo "COVERAGE_ARGS=-Dsonar.python.coverage.reportPaths=${{ inputs.coverage-path }}" >> $GITHUB_ENV
        else
          echo "COVERAGE_ARGS=" >> $GITHUB_ENV
        fi

    # 4️⃣ Executa SonarCloud
    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v2
      env:
        SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        SONAR_HOST_URL: https://sonarcloud.io
      with:
        args: >
          -Dsonar.organization=${{ inputs.sonar-organization }}
          -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
          -Dsonar.sources=.
          ${{ env.COVERAGE_ARGS }}
          ${{ inputs.sonar-args }}
# Download image artifact, load, login, push
# Job must set env: LOGIN_USERNAME, LOGIN_PASSWORD. For GHCR add REGISTRY=ghcr.io
name: Docker Push Artifact
description: Load image from artifact and push to registry

inputs:
  image-ref:
    description: 'Image ref used when saving (e.g. ghcr.io/org/repo:sha)'
    required: true
  push-tags:
    description: 'Tags to push (multiline)'
    required: true
  registry:
    description: 'Registry (e.g. ghcr.io). Omit for Docker Hub'
    required: false
    default: ''

outputs:
  digest:
    description: 'Image digest (sha256:...) — necessario para assinatura por digest imutavel'
    value: ${{ steps.push.outputs.digest }}

runs:
  using: composite
  steps:
    - name: Download image artifact
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: docker-image

    - name: Load image
      shell: bash
      run: docker load -i image.tar

    - name: Login to registry
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ env.LOGIN_USERNAME }}
        password: ${{ env.LOGIN_PASSWORD }}

    - name: Tag and push
      id: push
      shell: bash
      env:
        PUSH_TAGS: ${{ inputs.push-tags }}
      run: |
        : > /tmp/push.out
        echo "$PUSH_TAGS" | while IFS= read -r tag; do
          [ -z "$tag" ] && continue
          docker tag ${{ inputs.image-ref }} "$tag"
          docker push "$tag" | tee -a /tmp/push.out
        done
        DIGEST=$(grep -oE 'sha256:[a-f0-9]{64}' /tmp/push.out | head -1)
        if [ -z "$DIGEST" ]; then
          echo "::error::nao consegui extrair digest do output do docker push"
          exit 1
        fi
        echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

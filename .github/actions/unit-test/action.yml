name: Unit Test
description: Run unit tests and publish coverage artifact (lcov) for Sonar

inputs:
  node-version:
    required: false
    default: '24'

runs:
  using: composite
  steps:

    # Detecta gerenciador antes de tudo. Setup-node usa 'cache' diferente por
    # gerenciador, e pnpm tem que estar disponivel antes do setup-node pra
    # cache funcionar.
    - name: Setup pnpm
      if: ${{ hashFiles('pnpm-lock.yaml') != '' }}
      uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
      # Sem version: pega o pnpm pinado em packageManager do package.json.

    - name: Setup Node
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install dependencies
      shell: bash
      run: |
        if [ -f pnpm-lock.yaml ]; then
          pnpm install --frozen-lockfile
        elif [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi

    # Roda via gerenciador correto. Sem -- --coverage cravado: nem todo
    # runner aceita esse flag (Japa do Adonis ignora, npm test puro funciona).
    # Coverage em si e responsabilidade do consumer configurar (jest/vitest
    # built-in, ou c8 wrappando o test command).
    - name: Run tests
      shell: bash
      run: |
        if [ -f pnpm-lock.yaml ]; then
          pnpm test
        else
          npm test
        fi

    # Upload condicional: se o consumer nao gerar lcov.info, segue sem
    # quebrar. Sonar simplesmente nao recebe coverage e reporta 0.
    - name: Upload coverage artifact
      if: ${{ hashFiles('coverage/lcov.info') != '' }}
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: coverage
        path: coverage/lcov.info
